x-backend-environment: &backend-environment
  APP_ENV: ${APP_ENV:-local}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://fitness:fitness_dev_password@db:5432/fitness}
  MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql+psycopg://fitness:fitness_dev_password@db:5432/fitness}
  JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me-123456}
  ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-480}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5175}
  TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,backend}
  DEMO_INVITE_CODE: ${DEMO_INVITE_CODE:-FIT-DEMO-2026}
  COACH_REGISTRATION_CODE: ${COACH_REGISTRATION_CODE:-FIT-COACH-LOCAL-2026}
  DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-true}
  DEMO_SESSION_MINUTES: ${DEMO_SESSION_MINUTES:-30}
  SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
  MEDIA_STORAGE_PROVIDER: ${MEDIA_STORAGE_PROVIDER:-local}
  MEDIA_LOCAL_ROOT: ${MEDIA_LOCAL_ROOT:-./media}
  MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES:-5242880}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
  PORT: 8000
  DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
  DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
  DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
  DATABASE_POOL_RECYCLE: ${DATABASE_POOL_RECYCLE:-1800}
  DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-5}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
      POSTGRES_USER: ${POSTGRES_USER:-fitness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitness_dev_password}
    volumes:
      - fitness_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: fitness-intelligence-backend:local
    build: ./backend
    environment: *backend-environment
    ports:
      - "127.0.0.1:8000:8000"
    # Persist local media (avatars, exercise media) across restarts and share the
    # store with the seed job. Local storage is a dev/staging convenience only;
    # production uses a non-local provider.
    volumes:
      - fitness_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    profiles: ["tools"]
    image: fitness-intelligence-backend:local
    build: ./backend
    command: ["alembic", "upgrade", "head"]
    environment: *backend-environment
    depends_on:
      db:
        condition: service_healthy

  seed:
    profiles: ["tools"]
    image: fitness-intelligence-backend:local
    build: ./backend
    command: ["python", "-m", "scripts.seed"]
    environment: *backend-environment
    volumes:
      - fitness_media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
        VITE_APP_ENV: ${VITE_APP_ENV:-local}
    ports:
      - "127.0.0.1:5175:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fitness_postgres:
  fitness_media:
