services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitness}
      POSTGRES_USER: ${POSTGRES_USER:-fitness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitness_dev_password}
    volumes:
      - fitness_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://fitness:fitness_dev_password@db:5432/fitness}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me-123456}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-480}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5175}
      DEMO_INVITE_CODE: ${DEMO_INVITE_CODE:-FIT-DEMO-2026}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "5175:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fitness_postgres:
