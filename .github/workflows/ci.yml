name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      APP_ENV: local
      DATABASE_URL: sqlite:////tmp/fitness-ci.db
      JWT_SECRET: ci-validation-secret-with-at-least-32-characters
      ACCESS_TOKEN_MINUTES: 60
      CORS_ORIGINS: http://localhost:5175
      TRUSTED_HOSTS: localhost,testserver
      DEMO_INVITE_CODE: FIT-DEMO-2026
      DEMO_MODE_ENABLED: "false"
      SEED_DEMO_DATA: "false"
      API_DOCS_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e './backend[dev]'
      - run: ruff check backend
      - run: pytest backend/tests

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fitness_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fitness_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fitness_test
      MIGRATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/fitness_test
      JWT_SECRET: ci-migration-secret-with-at-least-32-characters
      CORS_ORIGINS: http://localhost:5175
      TRUSTED_HOSTS: localhost
      DEMO_INVITE_CODE: FIT-DEMO-2026
      DEMO_MODE_ENABLED: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e './backend[dev]'
      - working-directory: backend
        run: alembic upgrade head
      - working-directory: backend
        run: alembic current
      - working-directory: backend
        run: alembic check

  frontend:
    runs-on: ubuntu-latest
    env:
      VITE_APP_ENV: local
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_APP_VERSION: 0.4.2
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.example config --quiet
      - run: docker compose --env-file .env.example build
